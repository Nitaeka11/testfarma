<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Farmagitechs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0d6efd,#00b4d8);
            font-family:'Segoe UI',sans-serif;
            overflow:hidden;
        }

        .logout-card{
            width:420px;
            background:#fff;
            border:none;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
            animation:fadeUp .8s ease;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .icon-box{
            width:90px;
            height:90px;
            background:#dc3545;
            color:#fff;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:42px;
            margin:auto;
            animation:pulse 1.5s infinite;
        }

        @keyframes pulse{
            0%{transform:scale(1);}
            50%{transform:scale(1.08);}
            100%{transform:scale(1);}
        }

        h2{
            margin-top:20px;
            font-weight:bold;
            color:#343a40;
        }

        p{
            color:#6c757d;
            margin-bottom:25px;
        }

        .progress{
            height:10px;
            border-radius:30px;
            overflow:hidden;
        }

        .progress-bar{
            animation:loading 2.5s linear forwards;
        }

        @keyframes loading{
            from{
                width:0%;
            }
            to{
                width:100%;
            }
        }

        .footer{
            margin-top:20px;
            color:#999;
            font-size:14px;
        }
    </style>

</head>
<body>

<div class="logout-card">

    <div class="icon-box">
        <i class="bi bi-box-arrow-right"></i>
    </div>

    <h2>Logout Berhasil</h2>

    <p id="status">
        Menghapus sesi login dan mengarahkan ke halaman Login...
    </p>

    <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"></div>
    </div>

    <div class="footer">
        <strong>Farmagitechs Internship Test</strong>
    </div>

</div>

<script>

    // Hapus session/token
    sessionStorage.removeItem("token");
    localStorage.removeItem("token");

    // Jika ada data lain
    sessionStorage.clear();

    // Redirect ke login
    setTimeout(function(){

        window.location.href="index.html";

    },2500);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tambah Request</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:12px;
}

.card-header{
    font-weight:bold;
}

textarea{
    resize:none;
}

.btn{
    border-radius:8px;
}
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
<div class="container">

<a class="navbar-brand" href="#">
Farmagitechs
</a>

<a href="index.html" class="btn btn-light btn-sm">
Dashboard
</a>

</div>
</nav>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
Tambah Request
</div>

<div class="card-body">

<form id="requestForm">

<div class="mb-3">

<label class="form-label">
Product
</label>

<select
class="form-select"
id="product"
required>

<option value="">
-- Pilih Product --
</option>

<option value="2">
E-Doc
</option>

<option value="4">
SIMRS
</option>

<option value="5">
Evoluz
</option>

<option value="6">
Pendaftaran Online
</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">
Request Title
</label>

<input
type="text"
class="form-control"
id="title"
placeholder="Masukkan judul request"
required>

</div>

<div class="mb-3">

<label class="form-label">
Content
</label>

<textarea
class="form-control"
id="content"
rows="8"
placeholder="Tuliskan isi request..."
required></textarea>

</div>

<div class="d-flex justify-content-between">

<a href="index.html" class="btn btn-secondary">
Kembali
</a>

<button
type="submit"
class="btn btn-success">
Simpan Request
</button>

</div>

</form>

</div>

</div>

</div>

<script>

document.getElementById("requestForm").addEventListener("submit",function(e){

e.preventDefault();

let product=document.getElementById("product").value;
let title=document.getElementById("title").value;
let content=document.getElementById("content").value;

if(product=="" || title=="" || content==""){

alert("Semua field wajib diisi!");

return;

}

alert("Data siap dikirim ke API Farmagitechs");

// Di sini nanti dipanggil API
/*

"Content-Type":"application/json"
},

body:JSON.stringify({

hospital_id:1

})

})

.then(res=>res.json())
.then(data=>{

alert(data.message);

window.location="index.html";

});
*/

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

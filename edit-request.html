<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Request - Farmagitechs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f6fa;
}

.card{
    border:none;
    border-radius:12px;
}

.card-header{
    font-weight:bold;
}

textarea{
    resize:vertical;
}

.required{
    color:red;
}
</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

<div class="container">

<a class="navbar-brand" href="index.html">

Farmagitechs

</a>

<a href="index.html" class="btn btn-light btn-sm">

← Dashboard

</a>

</div>

</nav>

<!-- Content -->

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-warning">

<h4 class="mb-0">

Edit Request

</h4>

</div>

<div class="card-body">

<form id="editForm">

<input type="hidden" id="request_id">

<input type="hidden" id="request_uuid">

<div class="mb-3">

<label class="form-label">

Product

<span class="required">*</span>

</label>

<select
id="product"
class="form-select"
required>

<option value="">-- Pilih Product --</option>

<option value="2">E-Doc</option>

<option value="4">SIMRS</option>

<option value="5">Evoluz</option>

<option value="6">Pendaftaran Online</option>

<option value="7">SIM Report</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Request Title

<span class="required">*</span>

</label>

<input
type="text"
id="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Content

<span class="required">*</span>

</label>

<textarea
id="content"
rows="8"
class="form-control"
required></textarea>

</div>

<div class="d-flex justify-content-between">

<a
href="index.html"
class="btn btn-secondary">

Kembali

</a>

<button
type="submit"
class="btn btn-warning">

Update Request

</button>

</div>

</form>

</div>

</div>

</div>

<script>

// ==============================
// Contoh Data dari API Detail
// ==============================

const data={

request_id:7805,

request_uuid:"b05070d3-740b-11f1-bd41-91e89d4978ce",

request_title:"Perbaikan Dashboard",

product_id:2,

content:"Dashboard masih mengalami bug.",

status:"waiting"

};


// ==============================
// Isi Form
// ==============================

document.getElementById("request_id").value=data.request_id;

document.getElementById("request_uuid").value=data.request_uuid;

document.getElementById("title").value=data.request_title;

document.getElementById("product").value=data.product_id;

document.getElementById("content").value=data.content;


// ==============================
// Submit
// ==============================

document
.getElementById("editForm")
.addEventListener("submit",function(e){

e.preventDefault();

const body={

request_id:
document.getElementById("request_id").value,

request_uuid:
document.getElementById("request_uuid").value,

request_title:
document.getElementById("title").value,

product_id:
Number(document.getElementById("product").value),

content:
document.getElementById("content").value,

status:"waiting",

hospital_id:1

};

console.log(body);

// ==============================
// Contoh Fetch
// ==============================

/*

const token=sessionStorage.getItem("token");

fetch(

"http://192.168.0.199:9006/api/request/update",

{

method:"PUT",

headers:{

Authorization:"Bearer "+token,

"Content-Type":"application/json"

},

body:JSON.stringify(body)

})

.then(res=>res.json())

.then(res=>{

alert(res.message);

window.location.href="dashboard.html";

});

*/

alert("Data siap dikirim ke API.");

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

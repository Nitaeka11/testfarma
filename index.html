<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Request - Farmagitechs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f6fa;
}

.navbar-brand{
    font-weight:bold;
}

.card{
    border:none;
    border-radius:12px;
}

.table thead{
    background:#0d6efd;
    color:white;
}

.badge{
    font-size:13px;
}

.btn{
    border-radius:8px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

<div class="container">

<a class="navbar-brand" href="#">
Farmagitechs Request
</a>

<div class="ms-auto">

<a href="index.html" class="btn btn-light btn-sm">
Logout
</a>

</div>

</div>

</nav>

<!-- CONTENT -->

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-white">

<div class="d-flex justify-content-between align-items-center">

<h4 class="mb-0">
Request List
</h4>

<a href="add-request.html" class="btn btn-success">
+ Add Request
</a>

</div>

</div>

<div class="card-body">

<!-- FILTER -->

<div class="row g-3 mb-4">

<div class="col-md-3">

<label>Start Date</label>

<input
type="date"
class="form-control"
id="start_date">

</div>

<div class="col-md-3">

<label>End Date</label>

<input
type="date"
class="form-control"
id="end_date">

</div>

<div class="col-md-3">

<label>Product</label>

<select
class="form-select"
id="product">

<option value="">
Semua Product
</option>

<option value="2">
E-Doc
</option>

<option value="4">
SIMRS
</option>

<option value="5">
Evoluz
</option>

<option value="6">
Pendaftaran Online
</option>

</select>

</div>

<div class="col-md-3 d-flex align-items-end">

<button class="btn btn-primary me-2" id="btnFilter">
Filter
</button>

<button class="btn btn-secondary" id="btnReset">
Reset
</button>

</div>

</div>

<!-- TABLE -->

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead>

<tr>

<th>No</th>

<th>Title</th>

<th>Hospital</th>

<th>Product</th>

<th>Status</th>

<th>Request Time</th>

<th width="170">
Action
</th>

</tr>

</thead>

<tbody id="tableRequest">

<tr>

<td>1</td>

<td>Perbaikan Dashboard</td>

<td>RS Farmagitechs</td>

<td>E-Doc</td>

<td>

<span class="badge bg-warning text-dark">

Waiting

</span>

</td>

<td>

2026-06-15

</td>

<td>

<a
href="detail-request.html"
class="btn btn-info btn-sm">

Lihat

</a>

<a
href="edit-request.html"
class="btn btn-warning btn-sm">

Edit

</a>

</td>

</tr>

<tr>

<td>2</td>

<td>Tambah Laporan</td>

<td>Klinik Sehat</td>

<td>SIMRS</td>

<td>

<span class="badge bg-success">

Accepted

</span>

</td>

<td>

2026-06-14

</td>

<td>

<a
href="detail-request.html"
class="btn btn-info btn-sm">

Lihat

</a>

<a
href="edit-request.html"
class="btn btn-warning btn-sm">

Edit

</a>

</td>

</tr>

</tbody>

</table>

</div>

<!-- PAGINATION -->

<nav class="mt-3">

<ul class="pagination justify-content-end">

<li class="page-item disabled">

<a class="page-link">
Previous
</a>

</li>

<li class="page-item active">

<a class="page-link">

1

</a>

</li>

<li class="page-item">

<a class="page-link">

2

</a>

</li>

<li class="page-item">

<a class="page-link">

Next

</a>

</li>

</ul>

</nav>

</div>

</div>

</div>

<script>

// FILTER
document.getElementById("btnFilter").onclick=function(){

alert("Filter Data");

}

// RESET
document.getElementById("btnReset").onclick=function(){

document.getElementById("start_date").value="";

document.getElementById("end_date").value="";

document.getElementById("product").selectedIndex=0;

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
